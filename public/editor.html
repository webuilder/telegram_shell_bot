<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>文件编辑器</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
    }
    
    .filename {
      font-size: 14px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
      word-break: break-all;
    }
    
    .status {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #888);
      margin-top: 4px;
    }
    
    .editor-container {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }
    
    .editor {
      flex: 1;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--tg-theme-hint-color, #ddd);
      border-radius: 8px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      outline: none;
    }
    
    .editor:focus {
      border-color: var(--tg-theme-button-color, #0088cc);
    }
    
    .footer {
      padding: 12px 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      display: flex;
      gap: 12px;
    }
    
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .btn:active {
      opacity: 0.7;
    }
    
    .btn-save {
      background: var(--tg-theme-button-color, #0088cc);
      color: var(--tg-theme-button-text-color, #fff);
    }
    
    .btn-cancel {
      background: var(--tg-theme-hint-color, #ccc);
      color: var(--tg-theme-text-color, #000);
    }
    
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .loading-text {
      background: var(--tg-theme-bg-color, #fff);
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 16px;
    }
    
    .hidden {
      display: none !important;
    }
    
    .error {
      color: #e74c3c;
      padding: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="filename" id="filename">加载中...</div>
    <div class="status" id="status">正在读取文件</div>
  </div>
  
  <div class="editor-container">
    <textarea class="editor" id="editor" placeholder="文件内容..." disabled></textarea>
  </div>
  
  <div class="footer">
    <button class="btn btn-cancel" id="btnCancel" onclick="cancel()">取消</button>
    <button class="btn btn-save" id="btnSave" onclick="save()" disabled>保存</button>
  </div>
  
  <div class="loading hidden" id="loading">
    <div class="loading-text" id="loadingText">处理中...</div>
  </div>

  <script>
    let originalContent = '';
    let fileName = '';
    let token = '';
    let hash = '';
    let apiBase = '';
    
    // 初始化 Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // 设置主题颜色
    document.body.style.backgroundColor = tg.themeParams.bg_color || '#fff';
    
    // 从 URL 参数获取参数
    const urlParams = new URLSearchParams(window.location.search);
    fileName = urlParams.get('file') || '';
    token = urlParams.get('token') || '';
    hash = urlParams.get('hash') || '';
    apiBase = urlParams.get('api') || '';
    
    const filenameEl = document.getElementById('filename');
    const statusEl = document.getElementById('status');
    const editorEl = document.getElementById('editor');
    const btnSaveEl = document.getElementById('btnSave');
    const loadingEl = document.getElementById('loading');
    const loadingTextEl = document.getElementById('loadingText');
    
    if (!fileName || !token || !hash || !apiBase) {
      showError('参数错误，请重新打开');
    } else {
      filenameEl.textContent = fileName;
      loadFile();
    }
    
    function showLoading(text) {
      loadingTextEl.textContent = text;
      loadingEl.classList.remove('hidden');
    }
    
    function hideLoading() {
      loadingEl.classList.add('hidden');
    }
    
    function showError(message) {
      statusEl.textContent = '错误';
      statusEl.style.color = '#e74c3c';
      editorEl.value = message;
      editorEl.disabled = true;
      btnSaveEl.disabled = true;
    }
    
    async function loadFile() {
      showLoading('正在读取文件...');
      
      try {
        const response = await fetch(`${apiBase}/api/file?token=${encodeURIComponent(token)}&hash=${encodeURIComponent(hash)}`);
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || '读取文件失败');
        }
        
        originalContent = data.content || '';
        editorEl.value = originalContent;
        editorEl.disabled = false;
        btnSaveEl.disabled = false;
        statusEl.textContent = `大小: ${formatBytes(data.size || 0)} | 行数: ${(originalContent.match(/\n/g) || []).length + 1}`;
        
        // 监听内容变化
        editorEl.addEventListener('input', () => {
          const hasChanges = editorEl.value !== originalContent;
          btnSaveEl.textContent = hasChanges ? '保存' : '已保存';
          btnSaveEl.disabled = !hasChanges;
        });
        
      } catch (err) {
        showError(err.message);
      } finally {
        hideLoading();
      }
    }
    
    async function save() {
      const content = editorEl.value;
      
      showLoading('正在保存...');
      
      try {
        const response = await fetch(`${apiBase}/api/file`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token: token,
            hash: hash,
            content: content
          })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || '保存失败');
        }
        
        originalContent = content;
        btnSaveEl.textContent = '已保存';
        btnSaveEl.disabled = true;
        statusEl.textContent = `大小: ${formatBytes(data.size || 0)} | 行数: ${(content.match(/\n/g) || []).length + 1}`;
        
        // 显示成功提示
        tg.showPopup({
          title: '保存成功',
          message: '文件已保存',
          buttons: [{type: 'ok'}]
        });
        
      } catch (err) {
        tg.showAlert('保存失败: ' + err.message);
      } finally {
        hideLoading();
      }
    }
    
    function cancel() {
      const hasChanges = editorEl.value !== originalContent;
      
      if (hasChanges) {
        tg.showPopup({
          title: '放弃更改？',
          message: '你有未保存的更改，确定要放弃吗？',
          buttons: [
            {type: 'cancel'},
            {type: 'destructive', text: '放弃', id: 'discard'}
          ]
        }, (btnId) => {
          if (btnId === 'discard') {
            tg.close();
          }
        });
      } else {
        tg.close();
      }
    }
    
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    // 处理返回按钮
    tg.BackButton.show();
    tg.BackButton.onClick(cancel);
  </script>
</body>
</html>
